name: Build OLLVM Toolchain (Multi-Platform)

on:
  push:
    branches: [ "main", "master" ]
  tags:
    - 'ndk-*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: OLLVM-Windows-x64
            cmake_extra: -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
          - os: ubuntu-latest
            artifact_name: OLLVM-Linux-x64
            cmake_extra: ""
          - os: macos-latest
            artifact_name: OLLVM-macOS-arm64
            cmake_extra: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---- Windows only: setup MSVC + Ninja ----
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      # ---- Linux/macOS: ensure dependencies are available ----
      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja cmake

      # ---- Configure CMake (all platforms) ----
      - name: Configure CMake
        shell: bash
        run: |
          cmake -S llvm -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DLLVM_ENABLE_PROJECTS="clang;lld" \
                -DLLVM_TARGETS_TO_BUILD="X86;ARM;AArch64;RISCV" \
                ${{ matrix.cmake_extra }}

      # ---- Build ----
      - name: Build Core Tools
        shell: bash
        run: |
          ninja -C build clang lld llvm-ar llvm-strip llvm-nm llvm-objdump llvm-readelf llvm-objcopy llvm-ranlib

      # ---- Package ----
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path OLLVM_Dist/bin -Force
          $tools = @("clang.exe","clang++.exe","lld.exe","ld.lld.exe","llvm-ar.exe",
                     "llvm-strip.exe","llvm-nm.exe","llvm-objdump.exe","llvm-readelf.exe",
                     "llvm-objcopy.exe","llvm-ranlib.exe","clang-cl.exe","clang-cpp.exe")
          foreach ($t in $tools) {
            if (Test-Path "build/bin/$t") { Copy-Item "build/bin/$t" "OLLVM_Dist/bin/" }
          }

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p OLLVM_Dist/bin
          for tool in clang clang++ lld ld.lld llvm-ar llvm-strip llvm-nm llvm-objdump llvm-readelf llvm-objcopy llvm-ranlib; do
            [ -f "build/bin/$tool" ] && cp "build/bin/$tool" OLLVM_Dist/bin/
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: OLLVM_Dist/
