name: Build OLLVM Toolchain (Multi-Platform)

on:
  # 手动触发：在 GitHub Actions 页面点击 "Run workflow" 触发
  # push 自动触发已禁用，需要手动在 GitHub 上触发
  workflow_dispatch:


jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure CMake
        run: |
          cmake -S llvm -B build -G Ninja `
                -DCMAKE_BUILD_TYPE=Release `
                -DLLVM_ENABLE_PROJECTS="clang;lld" `
                -DLLVM_TARGETS_TO_BUILD="X86;ARM;AArch64;RISCV" `
                -DCMAKE_C_COMPILER=cl `
                -DCMAKE_CXX_COMPILER=cl

      - name: Build
        run: ninja -C build clang lld llvm-ar llvm-strip llvm-nm llvm-objdump llvm-readelf llvm-objcopy llvm-ranlib

      - name: Package
        run: |
          New-Item -ItemType Directory -Path OLLVM_Dist\bin -Force
          $tools = @("clang.exe","clang++.exe","lld.exe","ld.lld.exe","llvm-ar.exe",
                     "llvm-strip.exe","llvm-nm.exe","llvm-objdump.exe","llvm-readelf.exe",
                     "llvm-objcopy.exe","llvm-ranlib.exe","clang-cl.exe","clang-cpp.exe")
          foreach ($t in $tools) {
            if (Test-Path "build\bin\$t") { Copy-Item "build\bin\$t" "OLLVM_Dist\bin\" }
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OLLVM-Windows-x64
          path: OLLVM_Dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build cmake build-essential

      - name: Configure CMake
        run: |
          cmake -S llvm -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DLLVM_ENABLE_PROJECTS="clang;lld" \
                -DLLVM_TARGETS_TO_BUILD="X86;ARM;AArch64;RISCV"

      - name: Build
        run: ninja -C build clang lld llvm-ar llvm-strip llvm-nm llvm-objdump llvm-readelf llvm-objcopy llvm-ranlib

      - name: Package
        run: |
          mkdir -p OLLVM_Dist/bin
          for tool in clang clang++ lld ld.lld llvm-ar llvm-strip llvm-nm llvm-objdump llvm-readelf llvm-objcopy llvm-ranlib; do
            [ -f "build/bin/$tool" ] && cp "build/bin/$tool" OLLVM_Dist/bin/
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OLLVM-Linux-x64
          path: OLLVM_Dist/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ninja cmake

      - name: Configure CMake
        run: |
          cmake -S llvm -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DLLVM_ENABLE_PROJECTS="clang;lld" \
                -DLLVM_TARGETS_TO_BUILD="X86;ARM;AArch64;RISCV"

      - name: Build
        run: ninja -C build clang lld llvm-ar llvm-strip llvm-nm llvm-objdump llvm-readelf llvm-objcopy llvm-ranlib

      - name: Package
        run: |
          mkdir -p OLLVM_Dist/bin
          for tool in clang clang++ lld ld.lld llvm-ar llvm-strip llvm-nm llvm-objdump llvm-readelf llvm-objcopy llvm-ranlib; do
            [ -f "build/bin/$tool" ] && cp "build/bin/$tool" OLLVM_Dist/bin/
          done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OLLVM-macOS
          path: OLLVM_Dist/
